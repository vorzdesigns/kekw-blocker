<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 300px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0e0e10;
  color: #efeff1;
  padding: 16px;
}
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid #2f2f35;
}
.header img { width: 24px; height: 24px; }
.header h1 { font-size: 14px; font-weight: 600; }
.header .version { color: #adadb8; font-size: 11px; margin-left: auto; }

.status-card {
  background: #18181b;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 12px;
}
.status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}
.status-label { color: #adadb8; font-size: 12px; }
.status-value { font-size: 13px; font-weight: 500; }

.dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}
.dot-green { background: #4CAF50; }
.dot-orange { background: #FF9800; }
.dot-red { background: #F44336; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.stat-box {
  background: #18181b;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}
.stat-number {
  font-size: 20px;
  font-weight: 700;
  color: #bf94ff;
}
.stat-label {
  font-size: 10px;
  color: #adadb8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #18181b;
  border-radius: 8px;
  padding: 10px 12px;
}
.toggle-label { font-size: 13px; }
.toggle {
  position: relative;
  width: 36px; height: 20px;
  cursor: pointer;
}
.toggle input { opacity: 0; position: absolute; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #3a3a3d;
  border-radius: 10px;
  transition: 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 2px; bottom: 2px;
  background: white;
  border-radius: 50%;
  transition: 0.2s;
}
.toggle input:checked + .toggle-slider { background: #bf94ff; }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

.section-label {
  font-size: 10px;
  color: #adadb8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  margin-top: 4px;
}
.no-channel {
  text-align: center;
  padding: 20px;
  color: #adadb8;
  font-size: 13px;
}
.donate-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  margin-top: 12px;
  padding: 8px;
  background: #ff5e5b;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s;
}
.donate-btn:hover { background: #e04e4b; }
.donate-btn svg { flex-shrink: 0; }
</style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="">
    <h1>KEKW Blocker</h1>
    <span class="version">v1.0.1</span>
  </div>

  <div id="content">
    <div class="no-channel">Loading...</div>
  </div>

  <a class="donate-btn" href="https://ko-fi.com/dorquex" target="_blank" rel="noopener noreferrer">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="white"/></svg>
    Support KEKW Blocker
  </a>

  <script src="popup.js"></script>
</body>
</html>
