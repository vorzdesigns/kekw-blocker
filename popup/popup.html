<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 300px;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #121212;
  color: #d4d4d4;
  padding: 16px;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 2px solid #d4d4d4;
}
.header img {
  width: 36px;
  height: 36px;
}
.header h1 {
  font-size: 17px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.header .version {
  color: #999;
  font-size: 10px;
  font-weight: 600;
  margin-left: auto;
}
.header .settings-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #d4d4d4;
  border-radius: 4px;
  padding: 4px;
  margin-left: 4px;
  background: #1e1e1e;
  color: #d4d4d4;
  cursor: pointer;
  box-shadow: 2px 2px 0 #d4d4d4;
  transition: background 0.15s, box-shadow 0.15s;
}
.header .settings-btn:hover {
  background: #e07a3a;
  box-shadow: 2px 2px 0 #d4d4d4;
}

.status-card {
  background: #1e1e1e;
  border: 2px solid #d4d4d4;
  border-radius: 4px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 4px 4px 0 #d4d4d4;
}
.status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
}
.status-label {
  color: #777;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-value {
  font-size: 13px;
  font-weight: 700;
}
.status-enabled { color: #7ec88b; }
.status-blocking { color: #e07a3a; }
.status-disabled { color: #777; }

.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e1e1e;
  border: 2px solid #d4d4d4;
  border-radius: 4px;
  padding: 10px 12px;
  box-shadow: 4px 4px 0 #d4d4d4;
}
.toggle-label {
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.toggle {
  position: relative;
  width: 44px;
  height: 24px;
  cursor: pointer;
}
.toggle input { opacity: 0; position: absolute; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #2a2a2a;
  border: 2px solid #d4d4d4;
  border-radius: 4px;
  transition: 0.15s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  left: 3px;
  top: 50%;
  transform: translateY(-50%);
  background: #555;
  border-radius: 2px;
  transition: 0.15s;
}
.toggle input:checked + .toggle-slider {
  background: #e07a3a;
  border-color: #d4d4d4;
}
.toggle input:checked + .toggle-slider::before {
  transform: translateX(20px) translateY(-50%);
  background: #d4d4d4;
}
.toggle input:focus-visible + .toggle-slider {
  outline: 2px solid #e07a3a;
  outline-offset: 2px;
}

.no-channel {
  text-align: center;
  padding: 24px 12px;
  color: #777;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.donate-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  margin-top: 14px;
  padding: 9px;
  background: #1e1e1e;
  color: #d4d4d4;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 2px solid #d4d4d4;
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 3px 3px 0 #e07a3a;
  transition: background 0.15s, box-shadow 0.15s;
}
.donate-btn:hover {
  background: #e07a3a;
  box-shadow: 3px 3px 0 #d4d4d4;
}
.donate-btn svg { flex-shrink: 0; }
</style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="">
    <h1>KEKW Blocker</h1>
    <span class="version">v1.0.3</span>
    <button class="settings-btn" id="openSettings" title="Settings" aria-label="Open settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
    </button>
  </div>

  <a class="donate-btn" href="https://ko-fi.com/dorquex" target="_blank" rel="noopener noreferrer">

</body>
</html>
