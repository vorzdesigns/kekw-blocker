name: Config Auto-Update

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

concurrency:
  group: config-auto-update
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      exit_code: ${{ steps.extract.outputs.exit_code }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run config extraction
        id: extract
        env:
          REMOTE_CONFIG_ED25519_PRIVATE_KEY: ${{ secrets.REMOTE_CONFIG_ED25519_PRIVATE_KEY }}
          REMOTE_CONFIG_KEY_ID: k1
        run: |
          set +e
          node scripts/extract-config.js --ci
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      # Exit 1 = changes detected and written, Exit 2 = partial changes + extraction failure
      - name: Commit updated config
        if: steps.extract.outputs.exit_code == '1' || steps.extract.outputs.exit_code == '2'
        run: |
          if git diff --quiet remote-config.json 2>/dev/null; then
            echo "No config changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add remote-config.json
            git commit -m "chore: auto-update remote config

          Automated extraction detected updated values from Twitch's production bundles."
            git push
          fi

      # Exit 2 = extraction failed (patterns didn't match)
      - name: Upload failure report
        if: steps.extract.outputs.exit_code == '2'
        uses: actions/upload-artifact@v4
        with:
          name: extraction-failure
          path: extraction-failure.json

  # ─── AI Fallback ──────────────────────────────────────────────────────────
  # Only runs when regex extraction fails (exit code 2 = bundle restructure)
  ai-fallback:
    needs: extract
    if: needs.extract.outputs.exit_code == '2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull latest in case the extract job just pushed partial updates
      - name: Pull latest changes
        run: git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download failure report
        uses: actions/download-artifact@v4
        with:
          name: extraction-failure

      - name: Fetch Twitch bundles for AI analysis
        id: bundles
        run: |
          # Grab the main page and extract bundle URLs
          HTML=$(curl -sL https://www.twitch.tv/)
          URLS=$(echo "$HTML" | grep -oP 'https?://(?:static\.twitchcdn\.net|assets\.twitch\.tv)[^"'"'"']+\.js' | sort -u | head -10)

          # Download bundles (first 10, truncate each to 200KB to stay under token limits)
          mkdir -p /tmp/bundles
          i=0
          for url in $URLS; do
            curl -sL "$url" | head -c 200000 > "/tmp/bundles/bundle_$i.js"
            i=$((i+1))
          done

          # Combine into a single context file
          cat /tmp/bundles/*.js > /tmp/bundle_combined.txt
          BUNDLE_SIZE=$(wc -c < /tmp/bundle_combined.txt)
          echo "bundle_size=$BUNDLE_SIZE" >> "$GITHUB_OUTPUT"

      - name: Ask AI to extract config values
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Build a focused excerpt: lines near relevant keywords
          grep -n -i -C 2 'PlaybackAccessToken\|sha256Hash\|Client-ID\|clientId\|streamPlaybackAccessToken\|videoPlaybackAccessToken' /tmp/bundle_combined.txt | cut -c1-2000 | head -200 | head -c 500000 > /tmp/bundle_excerpt.txt

          # Call OpenAI via a self-contained Node script that reads files directly
          node -e "
            const https = require('https');
            const fs = require('fs');

            const failureReport = JSON.parse(fs.readFileSync('extraction-failure.json', 'utf8'));
            const failedFields = failureReport.failedFields.join(', ');
            const excerpt = fs.readFileSync('/tmp/bundle_excerpt.txt', 'utf8');

            const prompt = 'You are analyzing minified Twitch.tv JavaScript bundles to extract configuration values for a Twitch ad-blocker extension.\n\nI need you to find these values that our regex extraction failed to locate:\nFailed fields: ' + failedFields + '\n\nHere are relevant excerpts from Twitch JS bundles (lines near keywords):\n\n' + excerpt + '\n\nFor each field, respond ONLY with valid JSON in this exact format (no markdown, no explanation):\n{\n  \"playbackAccessTokenHash\": \"<64-char hex string or null if not found>\",\n  \"playbackAccessTokenQuery\": \"<full PlaybackAccessToken GraphQL query string or null if not found>\",\n  \"clientId\": \"<30-32 char alphanumeric string or null if not found>\",\n  \"confidence\": \"high|medium|low\",\n  \"notes\": \"<brief explanation of where you found the values>\"\n}';

            const body = JSON.stringify({
              model: 'gpt-5-mini',
              messages: [{ role: 'user', content: prompt }],
              max_tokens: 500,
              temperature: 0
            });

            const req = https.request({
              hostname: 'api.openai.com',
              path: '/v1/chat/completions',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.OPENAI_API_KEY
              }
            }, (res) => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => {
                try {
                  const parsed = JSON.parse(data);
                  const content = parsed.choices[0].message.content;
                  fs.writeFileSync('/tmp/ai_result.json', content);
                  console.log('AI response:');
                  console.log(content);
                } catch(e) {
                  console.error('Failed to parse OpenAI response:', data);
                  process.exit(1);
                }
              });
            });
            req.on('error', (e) => { console.error('Request failed:', e.message); process.exit(1); });
            req.write(body);
            req.end();
          "

      - name: Validate and apply AI results
        if: ${{ false }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            let aiResult;
            try {
              const raw = fs.readFileSync('/tmp/ai_result.json', 'utf8').trim();
              // Strip markdown code fences if present
              const cleaned = raw.replace(/^\`\`\`json?\n?/, '').replace(/\n?\`\`\`$/, '');
              aiResult = JSON.parse(cleaned);
            } catch(e) {
              console.error('Failed to parse AI result:', e.message);
              fs.writeFileSync('/tmp/should_open_issue', 'true');
              process.exit(1);
            }

            // Validate extracted values
            if (aiResult.confidence === 'low') {
              console.log('AI confidence is low — skipping auto-update, will open issue instead');
              fs.writeFileSync('/tmp/should_open_issue', 'true');
              process.exit(0);
            }

            const configPath = path.resolve('remote-config.json');
            const current = JSON.parse(fs.readFileSync(configPath, 'utf8'));
            let changed = false;

            if (aiResult.playbackAccessTokenHash && /^[a-f0-9]{64}$/.test(aiResult.playbackAccessTokenHash)) {
              if (aiResult.playbackAccessTokenHash !== current.playbackAccessTokenHash) {
                current.playbackAccessTokenHash = aiResult.playbackAccessTokenHash;
                changed = true;
                console.log('Updated playbackAccessTokenHash');
              }
            }

            if (aiResult.clientId && /^[a-z0-9]{30,32}$/.test(aiResult.clientId)) {
              if (aiResult.clientId !== current.clientId) {
                current.clientId = aiResult.clientId;
                changed = true;
                console.log('Updated clientId');
              }
            }

            if (changed) {
              current._lastChecked = new Date().toISOString();
              current._version = (current._version || 0) + 1;
              current._lastUpdateSource = 'ai-fallback';
              fs.writeFileSync(configPath, JSON.stringify(current, null, 2) + '\n');
              console.log('Config updated via AI fallback');
            } else {
              console.log('AI found no new values to update');
            }
          "

      - name: Validate and apply signed AI results
        env:
          REMOTE_CONFIG_ED25519_PRIVATE_KEY: ${{ secrets.REMOTE_CONFIG_ED25519_PRIVATE_KEY }}
          REMOTE_CONFIG_KEY_ID: k1
          AI_FALLBACK_SHOULD_OPEN_ISSUE_FILE: /tmp/should_open_issue
        run: |
          node scripts/apply-ai-config.js /tmp/ai_result.json || {
            echo "true" > /tmp/should_open_issue
            exit 1
          }

      - name: Commit AI-updated config
        run: |
          if git diff --quiet remote-config.json 2>/dev/null; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add remote-config.json
            git commit -m "chore: auto-update config via AI fallback

            Regex extraction failed — AI analyzed Twitch bundles and extracted updated values."
            git push
          fi

      - name: Open issue if AI confidence is low or extraction fully failed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open issue already exists to avoid duplicates
          EXISTING=$(gh issue list --state open --search "Config extraction failed" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — skipping"
            exit 0
          fi
          if [ -f /tmp/should_open_issue ] || [ ! -f /tmp/ai_result.json ]; then
            # Build issue body in a file to avoid shell injection from AI output
            node -e "
              const fs = require('fs');
              const failure = fs.existsSync('extraction-failure.json')
                ? fs.readFileSync('extraction-failure.json', 'utf8')
                : 'No failure report';
              const ai = fs.existsSync('/tmp/ai_result.json')
                ? fs.readFileSync('/tmp/ai_result.json', 'utf8')
                : 'AI fallback did not produce results';
              const body = [
                '## Automated Config Extraction Failed',
                '',
                'The config check could not extract values from Twitch production bundles, and the AI fallback either had low confidence or failed.',
                '',
                '### Failure Report',
                '\`\`\`json',
                failure.trim(),
                '\`\`\`',
                '',
                '### AI Fallback Result',
                '\`\`\`json',
                ai.trim(),
                '\`\`\`',
                '',
                '### Action Needed',
                '1. Check Twitch current JS bundles for the missing values',
                '2. Update \`remote-config.json\` manually',
                '3. If bundle structure changed significantly, update regex patterns in \`scripts/extract-config.js\`',
              ].join('\n');
              fs.writeFileSync('/tmp/issue_body.md', body);
            "

            gh issue create \
              --title "Config extraction failed — manual review needed" \
              --body-file /tmp/issue_body.md
          fi

  # ─── Deploy config to GitHub Pages ────────────────────────────────────────
  # Publishes remote-config.json to the public gh-pages branch so the
  # extension can fetch it without auth while the source repo stays private.
  deploy-config:
    needs: [extract, ai-fallback]
    if: |
      always() && (
        needs.extract.outputs.exit_code == '1' ||
        (needs.extract.outputs.exit_code == '2' && needs.ai-fallback.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest
        run: git pull --ff-only origin main

      - name: Deploy remote-config.json to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp remote-config.json /tmp/remote-config.json

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
            git pull --ff-only origin gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          cp /tmp/remote-config.json remote-config.json
          git add remote-config.json

          if git diff --cached --quiet 2>/dev/null; then
            echo "No config changes to deploy"
          else
            git commit -m "deploy: update remote-config.json"
            git push -u origin gh-pages
          fi

  # ─── Discord notification on failure ─────────────────────────────────────
  notify:
    needs: [extract, ai-fallback]
    if: always() && (needs.ai-fallback.result == 'failure' || needs.extract.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No DISCORD_WEBHOOK secret set — skipping notification"
            exit 0
          fi

          if [ "${{ needs.ai-fallback.result }}" = "failure" ]; then
            TITLE="KEKW Blocker: Config update FAILED"
            DESC="Regex extraction and AI fallback both failed. Manual intervention needed."
            COLOR=16711680
          elif [ "${{ needs.extract.result }}" = "failure" ]; then
            TITLE="KEKW Blocker: Extract job FAILED"
            DESC="The extract job crashed (runner/checkout/setup failure). Check workflow logs."
            COLOR=16711680
          else
            TITLE="KEKW Blocker: Config pipeline issue"
            DESC="An unexpected failure occurred in the config update pipeline."
            COLOR=16744448
          fi

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"$TITLE\",
              \"description\": \"$DESC\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Run\", \"value\": \"[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true},
                {\"name\": \"Time\", \"value\": \"$(date -u '+%Y-%m-%d %H:%M UTC')\", \"inline\": true}
              ]
            }]
          }" "$DISCORD_WEBHOOK"
